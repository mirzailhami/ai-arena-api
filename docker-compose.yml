# AI Arena API - Development Environment
# Docker Compose Configuration for NestJS service + PostgreSQL database

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-arena-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_arena
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-arena-network

  # AI Arena API - NestJS Service
  ai-arena-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-arena-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_arena?schema=public
      NODE_ENV: production
      PORT: 3000
      JWKS_URI: ${JWKS_URI:-https://auth.topcoder-dev.com/.well-known/jwks.json}
      VALID_ISSUERS: ${VALID_ISSUERS:-https://auth.topcoder-dev.com/}
      AUTH_SECRET: ""
      PROBLEMS_ROOT: /app/problems
      # ARENA_SYNTHETICA_WAR_PATH: /app/assets/synthetica2.war  # uncomment when WAR volume is mounted
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/problems:/app/problems
      # Mount Docker socket for problem testing (REQUIRED)
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: Mount synthetica2.war if available
      # - ./assets/synthetica2.war:/app/assets/synthetica2.war
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/arena-manager/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai-arena-network

volumes:
  postgres-data:
    driver: local
    name: ai-arena-postgres-data

networks:
  ai-arena-network:
    driver: bridge
    name: ai-arena-network
