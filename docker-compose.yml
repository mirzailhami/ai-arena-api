services:
  postgres:
    image: postgres:16
    container_name: ai-arena-api-postgres
    environment:
      POSTGRES_DB: ai_arena_api
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_arena_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  ai-arena-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-arena-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_arena_api?schema=public
      PORT: 3008
      AI_ARENA_API_DATA_ROOT: /app/data
      ARENA_SYNTHETICA_WAR_PATH: ''
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3008:3008'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src:/app/src
      - ai-arena-data:/app/data
    command: >
      sh -c "pnpm prisma:generate &&
             pnpm prisma:deploy &&
             pnpm start:dev"

volumes:
  postgres-data:
  ai-arena-data:
